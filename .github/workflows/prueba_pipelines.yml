name: Prueba pipeline

on: 
  push:
    branches:
      - main

jobs:
  pipelines_prueba:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reposiory
        uses: actions/checkout@v5
        with:
            fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-optional
      - name: Lint
        run: npm run eslint
      - name: Build 
        run: npm run build
      - name: Test
        run: npm test